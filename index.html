<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Swagger documentation for the Durable Archives Management Solution API."
    />
    <title>Durable Archives Management Solution API</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.17.14/swagger-ui.css"
    />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #f7f8fa;
      }

      body {
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      .topbar {
        display: none;
      }

      .swagger-ui .info {
        margin: 32px 0;
      }

      .swagger-ui .scheme-container {
        border-radius: 6px;
        box-shadow: 0 1px 4px rgba(20, 28, 36, 0.12);
      }
    </style>
  </head>
  <body>
    <main id="swagger-ui"></main>
    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.17.14/swagger-ui-bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.17.14/swagger-ui-standalone-preset.js"></script>
    <script>
      window.addEventListener("load", () => {
        window.ui = SwaggerUIBundle({
          url: "./spec/openapi.json",
          dom_id: "#swagger-ui",
          deepLinking: true,
          displayOperationId: true,
          defaultModelsExpandDepth: 1,
          defaultModelExpandDepth: 1,
          presets: [
            SwaggerUIBundle.presets.apis,
            SwaggerUIStandalonePreset,
          ],
          layout: "StandaloneLayout",
        });
      });
    </script>
  </body>
</html>
