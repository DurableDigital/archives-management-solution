<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Swagger documentation for the Durable Archives Management Solution API."
    />
    <title>Durable Archives Management Solution API</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.17.14/swagger-ui.css"
    />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #f7f8fa;
      }

      body {
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      .topbar {
        display: none;
      }

      .swagger-ui .info {
        margin: 32px 0;
      }

      .swagger-ui .scheme-container {
        border-radius: 6px;
        box-shadow: 0 1px 4px rgba(20, 28, 36, 0.12);
      }
    </style>
  </head>
  <body>
    <main id="swagger-ui"></main>
    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.17.14/swagger-ui-bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.17.14/swagger-ui-standalone-preset.js"></script>
    <script>
      async function loadSpec() {
        const response = await fetch("./spec/openapi.json.gz.b64");
        if (!response.ok) {
          throw new Error(`Unable to load OpenAPI spec: ${response.status}`);
        }

        const compressed = Uint8Array.from(
          atob((await response.text()).trim()),
          (character) => character.charCodeAt(0),
        );
        const stream = new Blob([compressed])
          .stream()
          .pipeThrough(new DecompressionStream("gzip"));
        const json = await new Response(stream).text();
        return JSON.parse(json);
      }

      window.addEventListener("load", async () => {
        const spec = await loadSpec();
        const renderSpec =
          spec.openapi === "3.0.4" ? { ...spec, openapi: "3.0.3" } : spec;
        window.ui = SwaggerUIBundle({
          spec: renderSpec,
          dom_id: "#swagger-ui",
          deepLinking: true,
          displayOperationId: true,
          defaultModelsExpandDepth: 1,
          defaultModelExpandDepth: 1,
          presets: [
            SwaggerUIBundle.presets.apis,
            SwaggerUIStandalonePreset,
          ],
          layout: "StandaloneLayout",
        });
      });
    </script>
  </body>
</html>
